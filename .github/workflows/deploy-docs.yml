name: Build and Publish Docs ZIP

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
  workflow_dispatch:

jobs:
  publish-docs-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create/update releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python markdown library
        run: pip install markdown pygments --quiet

      - name: Convert Markdown to HTML
        run: |
          set -euo pipefail
          python3 .github/scripts/md_to_html.py docs/ docs/_html/
          echo "--- Generated HTML files ---"
          find docs/_html -name "*.html" | wc -l

      - name: Create documentation ZIP from HTML site
        run: |
          set -euo pipefail
          cd docs/_html
          zip -r ../../documentation.zip .
          echo "ZIP size: $(du -sh ../../documentation.zip)"

      - name: Upload ZIP to GitHub Releases (docs-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: docs-latest
          name: "Documentation (latest)"
          body: |
            📦 Auto-generated documentation bundle (standalone HTML).

            This release is automatically updated on every push to `main` that modifies the `docs/` directory.

            **Download:** `documentation.zip` — unzip and open `index.html` in your browser to browse offline.
          files: documentation.zip
          prerelease: false
          make_latest: true

